<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gombo Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-row">
        <h1>Gombo</h1>
        <button id="logoutButton" class="logout-btn hidden" type="button">Çıkış</button>
      </div>
      <p>Nickname ve şifre ile giriş yapın; isterseniz yeni hesap da oluşturun.</p>
    </header>

    <main class="chat-area">
      <div id="messageList" class="message-list"></div>
      <form id="messageForm" class="message-form">
        <input id="messageInput" type="text" placeholder="Mesajınızı yazın..." autocomplete="off" />
        <button type="submit">Gönder</button>
      </form>
    </main>
  </div>

  <div id="loginOverlay" class="overlay active">
    <div class="login-card">
      <h2>Gombo'ya Hoşgeldin</h2>
      <p>Hesabın varsa giriş yap, yoksa kayıt ol.</p>
      <div class="auth-toggle" role="tablist" aria-label="Kimlik doğrulama modu">
        <button type="button" class="tab active" data-mode="login">Giriş Yap</button>
        <button type="button" class="tab" data-mode="signup">Kayıt Ol</button>
      </div>
      <form id="loginForm" class="login-form">
        <p id="authHint" class="auth-hint">Mevcut hesabınla giriş yap.</p>
        <label>
          Nickname
          <input id="nicknameInput" type="text" placeholder="Nickname" required maxlength="20" />
        </label>
        <label>
          Şifre
          <input id="passwordInput" type="password" placeholder="Şifre" required maxlength="30" />
        </label>
        <button id="authSubmitButton" type="submit">Giriş Yap</button>
      </form>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
